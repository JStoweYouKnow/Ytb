name: Production Verification

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Production base URL to verify"
        required: false
        default: "https://ashanti-6exqtj2u2q-uc.a.run.app"
  schedule:
    - cron: "0 13 * * *"

jobs:
  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run production verification
        id: verify
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://ashanti-6exqtj2u2q-uc.a.run.app' }}
        run: |
          mkdir -p artifacts
          echo "Verifying TARGET_URL=${TARGET_URL}"
          node scripts/verify-live-production.mjs "${TARGET_URL}" > artifacts/production-verification.json 2>&1

      - name: Upload verification artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-verification-report
          path: artifacts/production-verification.json
          if-no-files-found: error
