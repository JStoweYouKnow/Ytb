name: Production Verification

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Production base URL to verify"
        required: false
        default: "https://ashanti-6exqtj2u2q-uc.a.run.app"
  schedule:
    - cron: "0 13 * * *"

jobs:
  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Warm up production (retry health check)
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://ashanti-6exqtj2u2q-uc.a.run.app' }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 15 "${TARGET_URL}/health" > /dev/null; then echo "Health OK"; exit 0; fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Warm-up failed after 5 attempts; continuing to verification anyway"

      - name: Run production verification
        id: verify
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://ashanti-6exqtj2u2q-uc.a.run.app' }}
        run: |
          mkdir -p artifacts
          echo "Verifying TARGET_URL=${TARGET_URL}"
          node scripts/verify-live-production.mjs "${TARGET_URL}" > artifacts/production-verification.json 2>&1 || true
          echo "--- Verification output ---"
          cat artifacts/production-verification.json || true

      - name: Fail if verification did not pass
        run: |
          RESULT=$(jq -r '.result // "fail"' artifacts/production-verification.json 2>/dev/null) || RESULT="fail"
          if [ "$RESULT" != "pass" ]; then echo "Verification failed: result=$RESULT"; exit 1; fi

      - name: Upload verification artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-verification-report
          path: artifacts/production-verification.json
          if-no-files-found: error
